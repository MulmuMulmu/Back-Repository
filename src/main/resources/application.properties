spring.application.name=graduation_project

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preffered_uuid_jdbc_type: BINARY

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

kakao.api.key=${KAKAO_API_KEY}

spring.cloud.gcp.storage.credentials.location=file:gcp-key.json
spring.cloud.gcp.storage.project-id=My First Project
spring.cloud.gcp.storage.bucket=mulmumulmu_picture

server.forward-headers-strategy=framework

ai.ocr.base-url=${AI_OCR_BASE_URL:http://localhost:8000}
ai.recommend.base-url=${AI_RECOMMEND_BASE_URL:http://localhost:8002}





